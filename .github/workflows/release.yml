name: Release

on:
  push:
    tags:
      - addressable-*

jobs:
  release:
    if: github.repository == 'sporkmonger/addressable'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for trusted publishing
    steps:
      # tags are named addressable-VERSION, e.g. addressable-2.8.6
      - name: Set VERSION from git tag
        run: echo "VERSION=$(echo ${{ github.ref }} | cut -d - -f 2)" >> "$GITHUB_ENV"

      - name: Verify tag matches gemspec version
        run: |
          GEMSPEC_VERSION=$(ruby -e "puts Gem::Specification.load('addressable.gemspec').version")
          if [ "$VERSION" != "$GEMSPEC_VERSION" ]; then
            echo "ERROR: tag version ($VERSION) does not match gemspec version ($GEMSPEC_VERSION)"
            exit 1
          fi

      - name: Install libidn
        run: sudo apt-get install libidn11-dev

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          bundler-cache: true
          ruby-version: ruby

      - uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      # ensure gem can be built and installed
      - run: bundle exec rake gem:install

      # push gem to rubygems.org
      - run: gem push --verbose pkg/addressable-${VERSION}.gem
